<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifting Tracker</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .plot { width: 100%; max-width: 900px; height: 70vh; min-height: 350px; margin-bottom: 60px; }
        .controls {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #status { font-size: 14px; opacity: 0.7; }
        button {
            background: #eee;
            color: #333;
            border: 1px solid #ccc;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #ddd; }
        #loading { padding: 40px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="controls">
        <span id="status">Loading...</span>
        <button onclick="loadData()">Refresh</button>
    </div>
    <div id="loading">Fetching data...</div>
    <div id="plot-bench" class="plot"></div>
    <div id="plot-deadlift" class="plot"></div>
    <div id="plot-squat" class="plot"></div>

    <script>
        function parseSet(val) {
            if (!val) return { reps: 0, weight: 0 };
            val = val.trim();
            if (!val) return { reps: 0, weight: 0 };
            if (/[a-zA-Z]/.test(val.replace(/x/gi, ''))) return { reps: 0, weight: 0 };

            const parts = val.split(/x/i);
            if (parts.length === 1) {
                const w = parseFloat(parts[0]);
                return isNaN(w) ? { reps: 0, weight: 0 } : { reps: 1, weight: w };
            } else if (parts.length === 2) {
                const a = parseFloat(parts[0]);
                const b = parseFloat(parts[1]);
                if (isNaN(a) || isNaN(b)) return { reps: 0, weight: 0 };
                return { reps: a, weight: b };
            } else if (parts.length === 3) {
                const sets = parseFloat(parts[0]);
                const repsPerSet = parseFloat(parts[1]);
                const w = parseFloat(parts[2]);
                if (isNaN(sets) || isNaN(repsPerSet) || isNaN(w)) return { reps: 0, weight: 0 };
                return { reps: sets * repsPerSet, weight: w };
            }
            return { reps: 0, weight: 0 };
        }

        function parseCSV(text) {
            const rows = [];
            let current = '';
            let inQuotes = false;
            const lines = [];

            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (ch === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (ch === ',' && !inQuotes) {
                    lines.push(current);
                    current = '';
                } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
                    lines.push(current);
                    current = '';
                    rows.push(lines.splice(0));
                    if (ch === '\r' && text[i + 1] === '\n') i++;
                } else {
                    current += ch;
                }
            }
            if (current || lines.length) {
                lines.push(current);
                rows.push(lines.splice(0));
            }
            return rows;
        }

        function fixDate(dateStr) {
            let parsed = new Date(dateStr);
            if (isNaN(parsed.getTime())) return null;
            if (parsed.getFullYear() > 2026) {
                parsed.setFullYear(parsed.getFullYear() - 3);
            }
            return parsed;
        }

        // For bench: volume vs mean, colored by date
        function extractBench(dataRows, colStart, colEnd) {
            const dates = [], volumes = [], means = [], hoverTexts = [], dateNums = [];
            for (const row of dataRows) {
                if (!row || row.length < 2) continue;
                const dateStr = (row[0] || '').trim();
                if (!dateStr) continue;

                let totalVolume = 0, totalReps = 0, hasData = false;
                for (let c = colStart; c <= colEnd && c < row.length; c++) {
                    const parsed = parseSet(row[c]);
                    if (parsed.reps > 0 && parsed.weight > 0) {
                        totalVolume += parsed.reps * parsed.weight;
                        totalReps += parsed.reps;
                        hasData = true;
                    }
                }
                if (!hasData) continue;

                const dateObj = fixDate(dateStr);
                if (!dateObj) continue;

                const meanWeight = totalVolume / totalReps;
                dates.push(dateStr);
                dateNums.push(dateObj.getTime());
                volumes.push(totalVolume);
                means.push(meanWeight);
                hoverTexts.push(`${dateStr}<br>Mean: ${meanWeight.toFixed(1)}<br>Volume: ${totalVolume}`);
            }
            return { dates, dateNums, volumes, means, hoverTexts };
        }

        // For deadlift/squat: date vs top weight, sized/colored by reps at top weight
        function extractTopWeight(dataRows, colStart, colEnd) {
            const dates = [], topWeights = [], repsAtTop = [], hoverTexts = [];
            for (const row of dataRows) {
                if (!row || row.length < 2) continue;
                const dateStr = (row[0] || '').trim();
                if (!dateStr) continue;

                const dateObj = fixDate(dateStr);
                if (!dateObj) continue;

                // Collect all sets
                const sets = [];
                let hasData = false;
                for (let c = colStart; c <= colEnd && c < row.length; c++) {
                    const parsed = parseSet(row[c]);
                    if (parsed.reps > 0 && parsed.weight > 0) {
                        sets.push(parsed);
                        hasData = true;
                    }
                }
                if (!hasData) continue;

                // Find top weight and count reps at that weight
                let maxWeight = 0;
                for (const s of sets) {
                    if (s.weight > maxWeight) maxWeight = s.weight;
                }
                let repsTop = 0;
                for (const s of sets) {
                    if (s.weight === maxWeight) repsTop += s.reps;
                }

                dates.push(dateObj);
                topWeights.push(maxWeight);
                repsAtTop.push(repsTop);
                hoverTexts.push(`${dateStr}<br>Top: ${maxWeight}<br>Reps at top: ${repsTop}`);
            }
            return { dates, topWeights, repsAtTop, hoverTexts };
        }

        function makeColorbar(dateNums) {
            const valid = dateNums.filter(d => d > 0);
            const mn = Math.min(...valid), mx = Math.max(...valid);
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const tickvals = [], ticktext = [];
            for (let i = 0; i <= 4; i++) {
                const t = mn + (mx - mn) * i / 4;
                tickvals.push(t);
                const d = new Date(t);
                ticktext.push(`${months[d.getMonth()]} ${d.getFullYear()}`);
            }
            return { title: 'Date', tickvals, ticktext };
        }

        function plotBench(divId, data) {
            const trace = {
                x: data.means,
                y: data.volumes,
                mode: 'markers',
                type: 'scatter',
                marker: {
                    size: 12,
                    color: data.dateNums,
                    colorscale: [
                        [0, '#d73027'],
                        [0.25, '#fc8d59'],
                        [0.5, '#fee08b'],
                        [0.75, '#91bfdb'],
                        [1, '#4575b4']
                    ],
                    colorbar: makeColorbar(data.dateNums),
                    line: { width: 1, color: '#666' }
                },
                text: data.hoverTexts,
                hoverinfo: 'text',
                showlegend: false
            };

            const refLine = {
                x: [130, 175],
                y: [130 * 15, 175 * 15],
                mode: 'lines',
                type: 'scatter',
                line: { dash: 'dash', color: 'rgba(0,0,0,0.2)', width: 1.5 },
                hoverinfo: 'skip',
                showlegend: false
            };

            const layout = {
                title: { text: 'Bench', font: { color: '#333', size: 20 } },
                xaxis: { title: 'Mean', range: [130, 175], gridcolor: '#e0e0e0' },
                yaxis: { title: 'Volume', range: [1300, 4500], gridcolor: '#e0e0e0' },
                showlegend: false,
                paper_bgcolor: '#ffffff',
                plot_bgcolor: '#ffffff',
                margin: { t: 50, b: 50, l: 60, r: 20 }
            };

            Plotly.newPlot(divId, [refLine, trace], layout, { responsive: true, displayModeBar: false });
        }

        function plotTopWeight(divId, data, title, satReps) {
            // Size dots by reps at top weight, color by reps too
            // satReps caps the scale so anything >= satReps gets max size/color
            const capReps = satReps || Math.max(...data.repsAtTop);
            const sizes = data.repsAtTop.map(r => 6 + (Math.min(r, capReps) / capReps) * 24);

            const trace = {
                x: data.dates,
                y: data.topWeights,
                mode: 'markers',
                type: 'scatter',
                marker: {
                    size: sizes,
                    color: data.repsAtTop.map(r => Math.min(r, capReps)),
                    cmin: 0,
                    cmax: capReps,
                    colorscale: [
                        [0, '#fee08b'],
                        [0.5, '#fc8d59'],
                        [1, '#d73027']
                    ],
                    colorbar: { title: 'Reps at top' },
                    line: { width: 1, color: '#666' }
                },
                text: data.hoverTexts,
                hoverinfo: 'text',
                showlegend: false
            };

            const layout = {
                title: { text: title, font: { color: '#333', size: 20 } },
                xaxis: { title: 'Date', gridcolor: '#e0e0e0', type: 'date' },
                yaxis: { title: 'Top Weight', gridcolor: '#e0e0e0' },
                showlegend: false,
                paper_bgcolor: '#ffffff',
                plot_bgcolor: '#ffffff',
                margin: { t: 50, b: 50, l: 60, r: 20 }
            };

            Plotly.newPlot(divId, [trace], layout, { responsive: true, displayModeBar: false });
        }

        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('status').textContent = 'Loading...';

            const urls = [
                'https://docs.google.com/spreadsheets/d/1SlEJF74TRMOfuJFkaV0DX6n5SLbGs2PDiyeAyC_2hEQ/gviz/tq?tqx=out:csv',
                'https://docs.google.com/spreadsheets/d/1SlEJF74TRMOfuJFkaV0DX6n5SLbGs2PDiyeAyC_2hEQ/export?format=csv'
            ];

            let text = null;
            for (const url of urls) {
                try {
                    const resp = await fetch(url, { redirect: 'follow' });
                    if (resp.ok) {
                        text = await resp.text();
                        break;
                    }
                } catch (e) {
                    console.warn('Fetch failed for', url, e);
                }
            }

            if (!text) {
                document.getElementById('loading').textContent = 'Failed to fetch data. Try refreshing.';
                document.getElementById('status').textContent = 'Error';
                return;
            }

            const rows = parseCSV(text);
            const dataRows = rows.slice(2);

            const bench = extractBench(dataRows, 1, 5);
            const deadlift = extractTopWeight(dataRows, 6, 10);
            const squat = extractTopWeight(dataRows, 11, 15);

            document.getElementById('loading').style.display = 'none';

            plotBench('plot-bench', bench);
            plotTopWeight('plot-deadlift', deadlift, 'Deadlift', 5);
            plotTopWeight('plot-squat', squat, 'Squat', 7);

            const now = new Date();
            document.getElementById('status').textContent =
                `Last updated: ${now.toLocaleString()}`;
        }

        loadData();
    </script>
</body>
</html>
